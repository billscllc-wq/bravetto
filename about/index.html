<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bravetto — About Bravetto</title>
<style>
:root{
  --ink:#0C0F28; --gold:#C6902F; --gold-soft:#F3C46E; --ember:#F2A63C;
  --page:#FEFDF8; --panel:#F6EDD6; --text:#1b1c30; --muted:#6a6552; --line:#efe9db;
  --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--page)}
body{font-family:var(--sans);color:var(--text);background:var(--page);line-height:1.55;-webkit-font-smoothing:antialiased;max-width:1440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
.banner{display:block;width:100%;height:160px;object-fit:cover;object-position:center;background:#0C0F28;border-bottom:1px solid #efe9db}
header{display:flex;align-items:center;justify-content:space-between;padding:2px 40px;border-bottom:1px solid var(--line);background:rgba(254,253,248,.92);backdrop-filter:blur(6px)}
.logo{height:70px;width:auto;display:block}
nav{display:flex;gap:34px;font-size:17px}
nav a{color:#2a2c44;transition:color .15s}
nav a:hover,nav a.active{color:var(--ember)}
main{flex:1;padding:16px 40px 64px}
.eyebrow{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.crumb{font-size:14px;color:var(--muted);margin-bottom:14px}
.crumb a:hover{color:var(--ember)}
h1{font-family:var(--serif);font-weight:600;font-size:46px;color:var(--ink);letter-spacing:.2px;margin-bottom:14px}
.rule{width:54px;height:3px;background:var(--gold);border-radius:2px;margin:0 0 26px}
.lede{font-size:20px;color:#33344a;max-width:56ch;margin-bottom:26px}
.soon{display:inline-block;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);border:1px solid var(--line);border-radius:20px;padding:6px 14px;background:#fff}
.note{color:var(--muted);font-size:16px;margin-top:22px;max-width:56ch}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:960px;margin-top:4px}
.pcard{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .15s,transform .15s;color:inherit}
.pcard:hover{border-color:var(--ember);transform:translateY(-2px)}
.pthumb{aspect-ratio:16/6;overflow:hidden;background:#0C0F28;border-bottom:1px solid var(--line)}
.pthumb img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.pbody{padding:24px 24px 24px}
.pcard .kicker{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.pcard h2{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink);margin-bottom:8px}
.pcardrule{width:36px;height:3px;background:var(--gold);border-radius:2px;margin:0 0 12px}
.ptag{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ink);margin-bottom:8px}
.pdesc{font-size:15px;color:#4a4b60;margin-bottom:16px}
.plink{font-size:14px;font-weight:700;color:var(--ember)}
@media(max-width:760px){.pgrid{grid-template-columns:1fr}}
.figtitle{font-family:var(--serif);font-size:22px;color:var(--ink);margin-top:36px}
.figsub{color:var(--muted);font-size:15px;margin-top:4px;margin-bottom:2px;max-width:60ch}
.poster{width:100%;height:auto;display:block;border:1px solid var(--line);border-radius:12px;margin-top:18px}
.dl{display:inline-block;margin-top:16px;background:var(--ink);color:#fff;font-size:15px;padding:11px 22px;border-radius:24px}
.dl:hover{background:var(--ember)}
footer{border-top:1px solid var(--line);padding:22px 40px;color:var(--muted);font-size:14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
footer .tag{color:var(--gold)}
@media (max-width:720px){header{padding:8px 20px;flex-wrap:wrap;gap:12px}nav{gap:20px;font-size:15px}main{padding:60px 22px}h1{font-size:34px}}
</style>
</head>
<body>

  <nav><a href="../products/">Products</a><a href="../resources/">Resources</a><a href="../about/" class="active">About Bravetto</a><a href="../contact/">Contact</a></nav>
</header>
<img class="banner" src="../banner.svg" alt="">
<main>
  <div class="crumb"><a href="../">Home</a> &nbsp;/&nbsp; About Bravetto</div>
  <h1>About Bravetto</h1>
  <div class="rule"></div>
  <p class="lede">Brave, principled, rigorous—courage, conscience, and craft, in that order.</p>
  <p class="note">Small on purpose. It’s how you keep your morals when you build minds. Full story coming soon.</p>
  
</main>
<footer>
  <span>&copy; 2026 Bravetto</span>

</footer>

</html>
